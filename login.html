<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-login.css">
    <title>Login - Pet Care</title>
</head>
<body>
    <div class="login-container">
        <!-- Seção Esquerda -->
        <div class="login-illustration">
            <div class="pet-icon">🐶</div>
            <h2>Bem-vindo!</h2>
            <p>Conecte-se para cuidar melhor do seu pet. Acesso a serviços exclusivos e dicas de saúde animal.</p>
        </div>

        <!-- Seção Direita -->
        <div class="login-form">
            <div class="form-header">
                <h1>Login</h1>
                <p>Acesse sua conta</p>
            </div>

            <form>
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <!-- Senha -->
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <!-- Opções -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Lembrar-me</span>
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <!-- Botão Login -->
                <button type="submit" class="login-btn">Entrar</button>

                <!-- Redes Sociais -->
                <div class="divider">OU CONTINUE COM</div>
                <div class="social-login">
                    <button type="button" class="social-btn"><img class="socialicon" src="./img/icons/facebook.png"/></button>
                    <button type="button" class="social-btn"><img class="socialicon" src="./img/icons/google-circle.png"/></button>
                    <button type="button" class="social-btn"><img class="socialicon" src="./img/icons/linkedin-circle.png"/></button>
                </div>

                <!-- Sign Up -->
                <div class="signup-link">
                    Não tem conta? <a href="#">Cadastre-se aqui</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
